    const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;


// ── localStorage helpers (synchronous wrappers) ──────────────
const ls = {
  get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
  set: (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} },
  del: (key) => { try { localStorage.removeItem(key); } catch(e) {} },
  keys: (prefix) => {
    const out = [];
    try { for (let i=0; i<localStorage.length; i++) { const k=localStorage.key(i); if(!prefix||k.startsWith(prefix)) out.push(k); } } catch(e){}
    return out;
  }
};

// ── Global Progress Context ────────────────────────────────
// Single source of truth for all progress. Components read from here,
// saves write here AND to localStorage simultaneously — no async re-reads needed.
const ProgressCtx = createContext(null);

function ProgressProvider({ userName, children }) {
  const safeUser = (userName||'').replace(/[^a-zA-Z0-9]/g,'_');
  const progKey  = (id) => `prog_${safeUser}_${id}`;
  const mistakeKey = (id) => `mistakes_${safeUser}_${id}`;

  // Load all progress from localStorage into memory on mount / userName change
  const loadAll = useCallback(() => {
    const map = {};
    for (const t of TOPICS) {
      try { const v = ls.get(progKey(t.id)); map[t.id] = v ? JSON.parse(v) : {quizDone:0, flashDone:0}; }
      catch(e) { map[t.id] = {quizDone:0, flashDone:0}; }
    }
    return map;
  }, [safeUser]);

  const [progMap, setProgMap] = useState(loadAll);

  useEffect(() => { setProgMap(loadAll()); }, [userName]);

  // Call after quiz finishes — updates memory + persists
  const saveQuizProgress = useCallback((topicId, quizDone) => {
    setProgMap(prev => {
      const cur = prev[topicId] || {quizDone:0, flashDone:0};
      const updated = { ...cur, quizDone: Math.max(cur.quizDone||0, quizDone) };
      ls.set(progKey(topicId), JSON.stringify(updated));
      return { ...prev, [topicId]: updated };
    });
  }, [safeUser]);

  // Call after all flashcards seen — updates memory + persists
  const saveFlashProgress = useCallback((topicId, flashDone) => {
    setProgMap(prev => {
      const cur = prev[topicId] || {quizDone:0, flashDone:0};
      const updated = { ...cur, flashDone: Math.max(cur.flashDone||0, flashDone) };
      ls.set(progKey(topicId), JSON.stringify(updated));
      return { ...prev, [topicId]: updated };
    });
  }, [safeUser]);

  // Mistakes — still async-ish but not on critical path
  const saveMistakes = useCallback((topicId, newWrong) => {
    if (!newWrong.length) return;
    const key = mistakeKey(topicId);
    let existing = [];
    try { const v = ls.get(key); if(v) existing = JSON.parse(v); } catch(e){}
    const merged = {};
    for (const m of [...existing, ...newWrong]) merged[m.q] = {...m, ts: m.ts||Date.now()};
    ls.set(key, JSON.stringify(Object.values(merged)));
  }, [safeUser]);

  const getMistakes = useCallback((topicId) => {
    try { const v = ls.get(mistakeKey(topicId)); return v ? JSON.parse(v) : []; } catch(e) { return []; }
  }, [safeUser]);

  const resolveMistake = useCallback((topicId, question) => {
    const key = mistakeKey(topicId);
    try {
      const v = ls.get(key);
      const arr = v ? JSON.parse(v) : [];
      ls.set(key, JSON.stringify(arr.filter(m => m.q !== question)));
    } catch(e) {}
  }, [safeUser]);

  // Leaderboard (localStorage, shared_ prefix)
  const saveLeaderboard = useCallback((topicId, topicTitle, score, total, name) => {
    const n = (name||'Anonymous').trim()||'Anonymous';
    const key = `shared_lb_${topicId}_${n.replace(/[^a-zA-Z0-9]/g,'_')}`;
    let prevScore = 0;
    try { const ex = ls.get(key); if(ex) prevScore = JSON.parse(ex).score; } catch(e){}
    if (score >= prevScore) {
      ls.set(key, JSON.stringify({name:n, score, total, ts:Date.now(), topicId, topicTitle}));
    }
  }, []);

  const getLeaderboard = useCallback((filterTopicId) => {
    const allKeys = ls.keys('shared_lb_');
    const entries = [];
    for (const k of allKeys) {
      try { const v = ls.get(k); if(v) entries.push(JSON.parse(v)); } catch(e){}
    }
    if (filterTopicId && filterTopicId !== 'overall') {
      return entries.filter(e=>e.topicId===filterTopicId).sort((a,b)=>b.score-a.score);
    }
    // Overall: best score per topic per user
    const userMap = {};
    for (const e of entries) {
      if (!userMap[e.name]) userMap[e.name] = {name:e.name, score:0, total:0, topics:{}};
      const u = userMap[e.name];
      const prev = u.topics[e.topicId];
      if (!prev || e.score > prev.score) {
        if (prev) { u.score -= prev.score; u.total -= prev.total; }
        u.topics[e.topicId] = {score:e.score, total:e.total};
        u.score += e.score; u.total += e.total;
      }
    }
    return Object.values(userMap).sort((a,b)=>b.score-a.score);
  }, []);

  return (
    <ProgressCtx.Provider value={{ progMap, saveQuizProgress, saveFlashProgress, saveMistakes, getMistakes, resolveMistake, saveLeaderboard, getLeaderboard }}>
      {children}
    </ProgressCtx.Provider>
  );
}
const useProgress = () => useContext(ProgressCtx);

// Simple sync localStorage for non-progress data
const storage = {
  get: (key) => ls.get(key),
  set: (key, val) => ls.set(key, val),
};

const GLOBAL_CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0c0f1a;
    --bg-2:       #111520;
    --bg-3:       #161b2e;
    --surface:    rgba(255,255,255,0.035);
    --surface-2:  rgba(255,255,255,0.06);
    --surface-3:  rgba(255,255,255,0.09);
    --border:     rgba(255,255,255,0.07);
    --border-2:   rgba(255,255,255,0.12);

    --gold:       #d4a853;
    --gold-lt:    #f0c878;
    --gold-dk:    #a07830;
    --gold-glow:  rgba(212,168,83,0.18);

    --teal:       #3ecfa0;
    --teal-lt:    #6eddb8;
    --teal-dk:    #28a07a;
    --teal-glow:  rgba(62,207,160,0.15);

    --text:       #e8edf5;
    --text-2:     rgba(200,210,228,0.75);
    --text-3:     rgba(150,168,196,0.50);

    --radius:     18px;
    --radius-sm:  12px;
    --radius-xs:  8px;
    --tab-h:      68px;

    /* compat aliases */
    --amber:      var(--gold);
    --amber-lt:   var(--gold-lt);
    --amber-dk:   var(--gold-dk);
    --green:      var(--teal);
    --green-lt:   var(--teal-lt);
    --green-dk:   var(--teal-dk);
    --glass:      var(--surface);
    --glass-border: var(--border);
    --glass-strong: var(--surface-2);
    --ink:        var(--bg);
    --ink2:       var(--bg-2);
    --ink3:       var(--bg-3);
    --white:      var(--text);
    --text-dim:   var(--text-3);
  }

  html, body, #root {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Lora', Georgia, serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Background ─────────────────────────────── */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background: var(--bg);
    overflow: hidden;
  }
  .bg-canvas::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 10%, rgba(62,207,160,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 90%, rgba(212,168,83,0.05) 0%, transparent 55%),
      radial-gradient(ellipse 40% 60% at 70% 20%, rgba(62,207,160,0.03) 0%, transparent 50%);
  }
  .bg-orb { display: none; }
  .bg-grid { display: none; }

  /* ── App Shell ──────────────────────────────── */
  .app-shell {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .content-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom) + 12px);
    scroll-behavior: smooth;
  }
  .content-area::-webkit-scrollbar { width: 2px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb { background: rgba(62,207,160,0.25); border-radius: 2px; }

  /* ── Surfaces ──────────────────────────────── */
  .glass {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
  }
  .glass-strong {
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    border-radius: var(--radius);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .glass-3d {
    background: linear-gradient(145deg, rgba(255,255,255,0.055) 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-top-color: rgba(255,255,255,0.12);
    border-radius: var(--radius);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    box-shadow: 0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* ── Tab Bar ────────────────────────────────── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + env(safe-area-inset-bottom));
    background: rgba(12,15,26,0.96);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 2px;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 10px; border-radius: 12px;
    background: none; border: none; cursor: pointer;
    transition: all 0.22s cubic-bezier(0.34,1.5,0.64,1);
    min-width: 64px; color: var(--text-3);
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active {
    color: var(--teal);
  }
  .tab-btn.active svg {
    filter: drop-shadow(0 0 8px rgba(62,207,160,0.5));
  }
  .tab-btn svg { width: 20px; height: 20px; transition: transform 0.22s cubic-bezier(0.34,1.5,0.64,1); }
  .tab-btn.active svg { transform: translateY(-2px); }
  .tab-btn span {
    font-size: 9px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  /* ── Buttons ────────────────────────────────── */
  .btn-gold {
    display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dk) 100%);
    color: #fff; border: none;
    border-radius: var(--radius-sm);
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(62,207,160,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    letter-spacing: 0.01em;
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(62,207,160,0.4); }
  .btn-gold:active { transform: translateY(0) scale(0.98); }
  .btn-green {

  study:`## Chapter 1: Hadith and Its Types

### What is Hadith?
According to most scholars, Hadith encompasses three things:
- **Qawl** — the sayings of the Prophet ﷺ
- **Fi'al** — his actions  
- **Taqreer** — his tacit approval (silent acquiescence)

Hadith also applies to the speech, actions, and acquiescence of Companions (Sahabah) and Successors (Tabi'een).

---

### Types by Attribution

| Type | Meaning |
|------|---------|
| **Marfu'** | Goes back to the Prophet ﷺ ("raised") |
| **Mawquf** | Stops at a Companion ("halted") |
| **Maqtu'** | Stops at a Tabi'ee ("severed") |

### Hadith vs Athar vs Khabar
- Some restrict *Athar* to Companion/Tabi'ee narrations only; Prophetic narrations called *A'diyul Mathurah* also use this term
- *Khabar*: three views — (1) same as Hadith, (2) Hadith=Prophet; Khabar=others, (3) every Hadith is Khabar but not every Khabar is Hadith
- Scholar of Sunnah = **Muhaddith**; historian = **Akhbari**

---

### Six Means of Raf'a (Elevation to the Prophet ﷺ)

**Sareeh (Explicit):**
1. **Sareeh Qawli** — "I heard the Messenger of Allah say…"
2. **Sareeh Fi'ali** — "I saw the Messenger of Allah do…"

  study:`## Chapter 2: Classification Based on Sanad and Matn

### Sanad / Isnad
**Sanad** = the path leading to the Hadith — the chain of narrators.
**Isnad** = same meaning; sometimes used to mean the *act* of mentioning the sanad.

Ibn al-Mubarak: *"The isnad is from the religion. Were it not for the isnad, anyone could say anything."*

### Matn
**Matn** = what the Isnad ends at — the actual text of the Hadith (statement, action, or approval).

---

### Chain Types

**Muttasil (Connected):** No narrator missing — every narrator met the one above.

**Mu'allaq (Suspended):** Narrators omitted from the *start* of the isnad. Common in Bukhari's chapter headings. Bukhari's Mu'allaq narrations carry the ruling of Ittisaal since he committed only to Sahih.

**Mursal (Loose):** Tabi'ee narrates directly from the Prophet ﷺ, skipping the Companion. Missing link at the *end* of the sanad.

*Scholarly opinions on Mursal:*
- Majority: withhold judgment (tawaquf)
- Abu Hanifah & Malik: accepted unconditionally
- Shafi'i: accepted if supported by another chain
- Ibn Hazm: always weak
- Ahmad: accepted if narrator only narrates from reliable people

**Mu'dal (Problematic):** Two or more *consecutive* narrators missing from any point. Every Mu'dal is Munqati' but not vice versa.

**Mudallas (Misrepresented):** Narrator conceals actual shaykh using ambiguous wording.
- *Tadlis al-Isnad* — narrates from someone met but not heard from
- *Tadlis al-Shuyukh* — names teacher with unfamiliar name
- *Tadlis al-Taswiyyah* — drops weak narrator between two strong ones who met

Shu'ba: *"Misrepresentation is the brother of falsehood."*

**Mudtarib (Disrupted):** Transmitted in irreconcilable conflicting forms with chains of equal strength.

**Mudraj (Interpolated):** Narrator inserts their own words into the Hadith inseparably — in isnad (*Mudraj al-Isnad*) or text (*Mudraj al-Matn*).

**Riwayah bil-Ma'na (Narration by meaning):** Most scholars permit it if narrator knows Arabic well. Verbatim is preferred — the Prophet ﷺ said: *"May Allah enlighten the face of one who heard my speech and conveyed it as he heard."*

**Mu'an'an:** Narrated using 'an (from) without specifying method. Accepted if narrator and shaykh lived in same period (Muslim) or actually met (Bukhari).

**Musnad:** A Marfu' Hadith with a fully connected (Muttasil) chain to the Prophet ﷺ.`,

    </svg>),
  study:`## Chapter 3: Shadh, Munkar, and Mu\'allal

### Shadh (Anomalous)
A narration reported *contrary* to what trustworthy (thiqah) narrators report.

**Process:** If the contradicting narration's narrators are **not reliable** → Mardood (rejected). If narrators are **reliable** → apply **Tarjih** (preference):
- Preferred = **Mahfuz** (preserved) ✓
- Non-preferred = **Shadh** (anomalous) ✗

*Alternate definition:* Shadh = narration a single trustworthy narrator reported alone, with no basis for support — even if no contradiction exists.

---

### Munkar and Ma'ruf

| Narrators | Preferred | Non-preferred |
|-----------|-----------|---------------|
| Strong (thiqah) | Mahfuz ✓ | Shadh ✗ |
| Weak | Ma'ruf ✓ | Munkar ✗ |

**Munkar:** A weak narrator's narration contradicting a less-weak narrator's narration.
**Ma'ruf:** The less-weak narrator's narration — opposite of Munkar.

---

### Mu'allal (Defective)
A narration with subtle, hidden, difficult-to-discern defects hurting authenticity — detectable only by proficient, sagacious scholars.

**Examples of 'Illah (hidden defect):**
- Treating a Mursal chain as Muttasil (connected)
- Treating a Mawquf narration as Marfu'

Imam Nawawi: the 'Illah can be in the **sanad** or the **matn**.

*A Mu'allil cannot always fully articulate the defect* — like a money-changer who recognises a counterfeit coin but cannot explain every technical reason.

**Imam Daraqutni** was the unequaled master of this science.

---

### Mutabi', Shahid & I'tibar
- **Mutabi':** Corroborating narration from the **same Companion** — agrees in words+meaning (*Mithlahu*) or meaning only (*Nahwahu*)
- **Shahid:** Supporting narration from a **different Companion**
- **I'tibar:** The *process* of investigating all transmission paths to find Mutabi'/Shahid`,

  study:`## Chapter 4: Sahih, Hasan, and Da\'if

### 4.1 Sahih — Five Conditions
1. **Ittisaal us-Sanad** — connected chain (every narrator met the one above)
2. **\'Adaalah** of all narrators — uprightness
3. **Taamm ud-Dabt** — perfect accuracy/retention
4. **Free from Shudhoodh** — no anomaly
5. **Free from \'Illah** — no hidden defect

**Sahih li-Dhatihi:** All 5 conditions at full perfection — authentic by itself.
**Sahih li-Ghayrihi:** Originally Hasan, elevated by multiple supporting chains — authentic through corroboration.

---

### 4.2 Hasan — Key Principle
*Ibn Hajar al-Asqalani, Nukhbat al-Fikr:* The deficiency in Hasan is ONLY in the level of Dabt — specifically **Khafif ul-Dabt** (slightly deficient retention). All other four conditions still apply.

**Hasan li-Dhatihi:** All Sahih conditions met except Dabt is slightly deficient.
**Hasan li-Ghayrihi:** Originally Da\'if with mild weakness — elevated to Hasan when multiple similar weak narrations corroborate it.

Hasan is grouped with Sahih in deriving legal rulings.

---

### 4.3 Da\'if — Weak
Devoid of all or some conditions of Sahih/Hasan.

**Da\'if → Hasan li-Ghayrihi:** Multiple Da\'if with *mild* weakness can corroborate each other.
**Cannot rise** if weakness is severe: accusation of lying, strong anomaly, or excessive mistakes.

Ibn Salah & Ibn Habban: 49 types of Da\'if. Hafidh Iraqi: 42. Some scholars: up to 121 types.`,

{
  id:'ch5', chapter:'Chapter 5', title:'\'Adaalah — 5 Conditions of Uprightness', isExam:true,
  Icon:()=>(

    </svg>),
  study:`## Chapter 5: \'Adaalah — Integrity and Uprightness

### Definition
**\'Adaalah** = a faculty inducing adherence to:
- **Taqwa** — abstaining from polytheism, transgression, and innovation. Persisting on minor sins = major sin.
- **Muru\'ah** — freedom from undignified acts (eating in a market, urinating on a road).

\'Adl in narrating Hadith is **more general** than \'Adl in witnessing — includes free men AND slaves.

---

### Five Reasons for Ta\'n (Aspersion) in \'Adaalah

**1. Kizb (Lying/Fabrication)**
→ Narration = **Mawdu\'** (Fabricated)
→ NEVER accepted even after repentance (Imam Ahmad, Imam Humaidi)
*(Unlike false witness — testimony accepted after repentance)*
*Imam Nawawi's preferred view: repentance should be considered.*

**2. Ittihaam bil-Kizb (Accused of Lying)**
Narrator famous for lying in general conversation.
→ Narration = **Matrook** (Abandoned)
→ If repentance and signs of integrity appear — Hadith may then be heard.

**3. Fisq (Open Moral Corruption)**
Corruption of morals/conduct — not beliefs (that is Bid\'ah). Bid\'ah Ta\'n is more severe than Fisq.

**4. Jahalah (Unknown Status)**
Sub-type: **Mubham** — "a man narrated to me" — unacceptable unless narrator is a Companion.
Sounder opinion: Even if a reliable narrator says "an upright person told me" — still not accepted (unless a proficient Imam).

**5. Bid\'ah (Innovation)**
Believing in innovation opposing what is known from the Prophet ﷺ and Companions.

Two types:
- **Bid\'ah Mukaffarah** — constitutes disbelief (denying Quran\'s preservation, alleging against A\'isha R.A., denying finality of Prophethood, Qadyani beliefs)
- **Bid\'ah Mufassiqah** — deviation without disbelief (Khawarij, Mu\'tazilah beliefs)

**Preferred ruling:** If they PROPAGATE innovation → rejected. If they do NOT → accepted. UNLESS narration supports their innovation → rejected.

**All Companions are \'Adil** by scholarly consensus.`,

    </svg>),
  study:`## Chapter 6: Causes of Aspersion Related to Dabt (Accuracy)

### 5 Causes of Ta\'n in Dabt

1. **Fart al-Ghaflah** — Excessive Heedlessness (deficiency in HEARING/RETAINING)
2. **Kathrat al-Ghalat** — Frequent Errors (deficiency in TRANSMITTING)
3. **Mukhalafat al-Thiqaat** — Contradiction of Reliable Narrators
4. **Wahm** — Delusion/False Impression → leads to Mu\'allal
5. **Su\' al-Hifz** — Poor Memory

---

### Ghaflah vs Ghalat
- **Ghaflah** = heedlessness in *hearing and retaining* from the shaykh
- **Ghalat** = errors in *narrating and transmitting*

Both produce **Munkar** narrations.

---

### Mukhalafat al-Thiqaat
Root cause of: Munkar, Shadh, Mudtarib, Muqloob (inverted), Mudraj, etc.

**Muqloob (Inverted):** Something in matn or sanad stated in reversed manner. Example: "Murra ibn Ka\'b" stated as "Ka\'b ibn Murra."

---

### Wahm — Most Obscure Science
Narrator falls into error due to false impressions. If identifiable through evidence → Hadith is **Mu\'allal**.

The most obscure and delicate science — accessible only to those with vast memory and complete knowledge of narrator states.

**Imam Daraqutni** = unequaled master. Scholars say no equal succeeded him.

---

### Su\' al-Hifz & Mukhtalit
**Su\' al-Hifz:** Mistakes exceed accuracy — errors and forgetfulness surpass precision.

**Mukhtalit** — narrator whose memory *suddenly* deteriorates (old age, loss of sight, loss of books):
- Before Ikhtilat → **accepted** if distinguishable
- After Ikhtilat → **not accepted**
- Indistinguishable → **withhold judgment**

Corroborative narrations (Mutabi\'at/Shawahid) can improve status from rejected to accepted.`,

    </svg>),
  study:`## Chapter 7: Gharib, \'Aziz, Mashhur, and Mutawatir

| Category | Narrators at any level | Knowledge Produced |
|----------|----------------------|-------------------|
| **Gharib / Fard** | 1 | — |
| **\'Aziz** | 2 | — |
| **Mashhur / Mustafeed** | 3+ | — |
| **Mutawatir** | Conspiracy impossible | Yaqeen (certainty) |

Gharib, \'Aziz, and Mashhur are all **Ahaad** narrations.

---

### Gharib / Fard
One narrator at any level — also called Fard (singular).

**Singularity does not negate soundness** — a Gharib can be Sahih if all narrators are reliable.

*Alternate use:* Gharib sometimes means Shadh (anomalous) — context determines.

**Fard Nisbi:** Narrator alone at ONE SPECIFIC level only.
**Fard Mutlaq:** Narrator alone at EVERY level.

Classic Fard Mutlaq example: *"Actions are but by intentions"* — only proper sanad: Yahya ibn Sa\'eed al-Ansari → Muhammad ibn Ibrahim al-Taymi → \'Alqamah ibn Waqas al-Laythi → Umar ibn al-Khattab R.A.

---

### Mutawatir
So many narrators at every level that conspiracy to fabricate is **inconceivable** → **Yaqeen** (absolute certainty).

Scholars differ on minimum number required (ranging from 4 to 70+) — at *every* stage.

**Tawatur bil-Ma\'na:** A concept appearing in many narrations collectively (e.g. return of Isa A.S.) — even if individual narrations are not Mutawatir.

### Ahaad vs Mutawatir
- **Mutawatir** → **Yaqeen** (certain knowledge)
- **Ahaad** → **Zann al-Rajih** (strong probability) — sufficient for legal rulings`,

  study:`## Chapter 8: Levels of Hadith

### 7-Level Preference Ladder

1. **Muttafaq \'Alayh** — agreed by BOTH Bukhari and Muslim (from one Sahabi) → **2326 narrations**

6. Per conditions of Muslim (not by him)
7. By other scholars committed to soundness

*"Conditions of Shaykhain"* — not stated by them. Later scholars observed their selections and identified what narrator characteristics they required.

---

### Most Authentic Sanad
Scholars disagreed — no conclusive declaration possible. Possible claims:
- *Zain al-Abidin ← Hussain ← Ali ibn Abi Talib*
- *Malik ← Naf\'e ← Ibn Umar*
- *Zuhri ← Salim ← Ibn Umar*

Cannot conclusively declare any one chain most authentic — but can identify most authentic *within a specific context*.

---

### Imam Tirmidhi\'s Unique Terminology
Uses combinations: "Hasan Sahih," "Gharib Hasan," "Hasan Gharib Sahih."

**How Gharib + Hasan coexist:**
Multiple chains is *one type* of Hasan — not absolute condition. Gharib refers to one chain while supporting chains make it Hasan overall. OR: the conjunction may mean "or" (Tirmidhi uncertain between two grades). OR: "Hasan" used in its linguistic sense.`,

  study:`## Chapter 9: Inference of Legal Rulings from Hadith

### Sahih in Legal Rulings
**Consensus** of all Ahlus Sunnah wal Jama\'ah — Sahih is used for legal rulings. Rejecting authentic Hadith = misguidance.

### Hasan in Legal Rulings
**Consensus of most scholars** — grouped with Sahih in inferring rulings, though Hasan is lower in status.

---

### Da\'if — Three Scholarly Opinions

**Opinion 1 — Reject entirely:**
Weak narrations rejected outright — cannot be used in any form.

**Opinion 2 — Accept when no better evidence:**
Some scholars validate use of weak narrations, preferring them over acting on personal opinion (ra\'y) when no other evidence exists.

**Opinion 3 (most discussed) — Limited use for Fada\'il:**
Da\'if can be acted upon for moral virtues (Fada\'il al-A\'mal) under conditions — NOT for Aqeedah or binding legal rulings.

---

### Hasan li-Ghayrihi → Consensus for Legal Use
Da\'if narrations that rose to Hasan li-Ghayrihi through corroboration → consensus they can be used for legal rulings.

---

### Conditions for Da\'if in Fada\'il (Virtues)
- Weakness must be **mild**: poor memory, confusion/Ikhtilat, misrepresentation/Tadlis — despite narrator\'s honesty
- **NOT** if: accusation of lying (Ittihaam), anomaly (Shudhudh), or excessive mistakes (Fahsh al-Ghalat)

Once multiple weak narrations corroborate each other → Hasan li-Ghayrihi — no longer treated as individually Da\'if.`,

  study:`## Chapter 10: Books of Authentic Narrations

### Sahih al-Bukhari
Most preferred by most Hadith scholars: *"The most authentic book after the Book of Allah (Quran)."*
- Written over **16 years**
- Selected from **600,000+ narrations**
- Imam Bukhari: *"I have not mentioned any Hadith here except which is Sahih and I have left many Sahih Hadiths."*
- Classified as **Jami\'** — broad coverage of legal and ritual topics
- **97 chapters** with headings guiding legal implications

### Sahih Muslim
Some Maghrebi scholars prefer it for superior clarity, arrangement, and organization.
**Majority view:** Bukhari = stronger in authenticity; Muslim = better organized.
Imam Muslim: *"What I left is not necessarily Da\'if."*

---

### Other Sahih Collections

**Al-Mustadrak (al-Hakim):** Compiled Sahih narrations left by Bukhari/Muslim. 7,275 narrations total; ~4,000 after removing repetitions. Scholars noted leniency. Read with Dhahabi\'s corrections — his *Tasweeb* reviews are essential.

**Sahih Ibn Khuzaymah:** Called "Imam of Imams." Very close to Sahih Muslim in rank. Three-quarters was lost by Ibn Hajr\'s time.

**Sahih Ibn Habban:** Student of Ibn Khuzaymah. Slightly lenient criteria — some Hasan and Da\'if entered. Reorganized by al-Farsi al-Hanafi (d. 737H) per Fiqh branches.

**Al-Mukhtar (al-Maqdisi):** Scholars say: "Better than al-Mustadrak." Compiled alphabetically per Companion names. Incomplete at his death.`,

  study:`## Chapter 11: The Six Famous Books of Hadith

### Kutub us-Sittah

| # | Book | Author | Death |
|---|------|--------|-------|
| 1 | **Sahih al-Bukhari** | Imam Muhammad ibn Ismail al-Bukhari | **256 AH** |
| 2 | **Sahih Muslim** | Imam Muslim ibn al-Hajjaj al-Qushayri | **261 AH** |
| 3 | **Jami\' at-Tirmidhi** | Imam Abu \'Isa al-Tirmidhi | **279 AH** |
| 4 | **Sunan Abi Dawood** | Imam Abu Dawood al-Azdi | **275 AH** |
| 5 | **Sunan an-Nasa\'i** | Imam Ahmad ibn Shu\'ayb an-Nasa\'i | **303 AH** |
| 6 | **Sunan Ibn Majah** | Imam Muhammad ibn Yazid ibn Majah | **273 AH** |

**Memory Aid (by death year):** Bukhari 256 → Muslim 261 → Ibn Majah 273 → Dawood 275 → Tirmidhi 279 → Nasa\'i 303

---

### Controversy on the Sixth Book
Some scholars (author of *Jami\' al-Usul*) replace Ibn Majah with **Al-Muwatta of Imam Malik**.
- Against Ibn Majah: ~1/4 of its 4,485 narrations are Da\'if
- For Ibn Majah: contains ~1,522 unique narrations not found in the other five books

### Taghlib
The six books called "Sihah" by **Taghlib** — indicating predominance of Sahih, not that they contain only Sahih. The four Sunan contain Sahih, Hasan, AND Da\'if.

      <circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
    </svg>),
  study:`## Jarh wa Ta\'deel — The Science of Narrator Evaluation

### Definitions
**Jarh (Criticism):** Declaring a narrator unreliable — exposing flaws in \'Adaalah or Dabt.
**Ta\'deel (Praise):** Declaring a narrator trustworthy and reliable.

---

### Levels of Ta\'deel (Praise) — Ascending

| Term | Meaning | Hadith Grade |
|------|---------|-------------|
| لا بأس به (La ba\'sa bihi) | Not problematic | Acceptable/Hasan |
| صدوق (Sadooq) | Truthful | Hasan |
| ثقة (Thiqah) | Trustworthy | Strong Sahih |
| ثقة ثبت (Thiqah Thabt) | Firm trustworthy | Strong Sahih |
| حافظ (Hafidh) | Memorizer | Strong Sahih |
| أثبت الناس (Athabt un-nas) | Firmest of people | Strongest Sahih |

### Levels of Jarh (Criticism) — Ascending Severity

| Term | Meaning |
|------|---------|
| فيه لين (Feehi leen) | Slight softness/weakness |
| ليس بالقوي (Laysa bil-qawi) | Not strong |
| ضعيف (Da\'if) | Weak |
| ضعيف جداً / واهٍ | Very weak/Flimsy |
| متروك (Matrook) | Abandoned — accused of lying |
| كذاب / وضّاع | Liar / Fabricator |

---

### Key Principles

1. **Jarh takes precedence over Ta\'deel** — critic has additional knowledge
2. **Jarh must be explained** — vague Mubham criticism may not be accepted
3. **Character of the critic** — must be knowledgeable, just, free from personal animosity`,
  flashcards:[
    {f:'Jarh wa Ta\'deel',b:'Science of narrator evaluation — Jarh (criticism) exposes flaws; Ta\'deel (praise) declares trustworthiness'},

    {f:'Why Jarh must be explained',b:'Vague (Mubham) criticism without reason may not be accepted — the specific flaw must be stated'},
    {f:'Thiqah (ثقة)',b:'Trustworthy — strong Sahih level narrations'},
    {f:'Sadooq (صدوق)',b:'Truthful — Hasan level narrations'},
    {f:'Matrook (متروك)',b:'Abandoned — very severe; narrator accused of lying'},

    {f:'Feehi leen (فيه لين)',b:'"There is softness/leniency in him" — MILDEST Jarh; slightly weak narrator'},
    {f:'Majhool (مجهول)',b:'Unknown narrator — identity or reliability unknown; narrations unacceptable'},

     e:'Jarh takes precedence over Ta\'deel — the critic has additional knowledge that the praiser lacks. They have identified a specific flaw that others may not know about.'},
    {q:'Thiqah indicates narrations at which level?',o:['Hasan','Strong Sahih','Da\'if','Mawquf'],a:1,
     e:'Thiqah (trustworthy) is a strong Ta\'deel term indicating strong Sahih level narrations. It is higher than Sadooq (Hasan level) but below the highest praise terms like Thabt or Hafidh.'},
    {q:'Sadooq is associated with which level?',o:['Strong Sahih','Hasan','Da\'if','Matrook'],a:1,

    {q:'Why must Jarh be explained?',o:['To be fair to narrators','Vague Mubham criticism without reason may not be accepted','Islamic law requires it','To help students memorize'],a:1,

  study:`## Sheikh Abdul Haq Mohadith Dehlawi

### Name and Lineage
- **Full name:** Abdul Haq

- **Common name:** Mohadith Dehlawi

---

### Scholarly Career
- Initial education organized by his father
- Acquired knowledge from notable scholars of India
- **996 AH / 1587 CE:** Traveled to Hijaz — partly due to disapproval of Mughal Emperor Akbar\'s innovations
- In Makkah and Madinah: studied under prominent Hadith scholars including:

  - **Shaikh \'Ali ibn Yar al-Hirawee**
  - Others of the Shafi\'i school

---

### Return and Legacy
- Returned to Delhi with deep Hadith knowledge and authorization
- **Pioneer** of Hadith sciences in the Indian subcontinent
- He made Hadith study the central focus of Islamic scholarship in India
- **First to introduce** systematic Hadith methodology to Indian scholarly circles

### Works
- Authored **over 116 books** in Arabic and Persian
- Wrote extensively on Hadith, Fiqh, Tasawwuf, and Islamic history
- **Muqaddimah Usool al-Hadith** — comprehensive introduction to Hadith sciences (the source of this academy\'s content)
- Other major works: Ashi\'at al-Lam\'aat (commentary on Mishkat), Tarjuman ul-Hadith, etc.

### Death

        {TOPICS.map(t=>{
          const p=progMap[t.id]||{};

          const fp=Math.min((p.flashDone||0)/(t.flashcards?.length||1),1);
          const pct=Math.round(((qp+fp)/2)*100);
          return (
            <div key={t.id} className="glass-3d topic-card" onClick={()=>onSelect(t.id)}>
              <div className="topic-card-inner">

                  </div>
                  <div className="topic-title">{t.title}</div>

                    <path d="M9 18l6-6-6-6"/>
                  </svg>

              </div>
            </div>
          );

  );
}


function ProgRing({pct,size=50,stroke=4}){
  const r=Math.floor((size-stroke*2)/2);
  const circ=2*Math.PI*r;
  const off=circ*(1-pct/100);
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="prog-ring">
      <circle className="prog-ring-bg" cx={size/2} cy={size/2} r={r} strokeWidth={stroke}/>
      <circle className="prog-ring-fill" cx={size/2} cy={size/2} r={r} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={off}/>
      <text x="50%" y="50%" dominantBaseline="middle" textAnchor="middle"
        fill="var(--teal)" fontSize={size*0.24} fontFamily="Plus Jakarta Sans,sans-serif" fontWeight="700">{pct}</text>
    </svg>
  );
}

// ─── Study Mode ────────────────────────────────────────────
function StudyMode({topic}){
  const rendered = renderMarkdown(topic.study||'');
  return(
    <div style={{padding:'8px 16px 24px'}}>
      <div className="glass-3d" style={{padding:'20px 18px'}}>
        <div className="study-body" dangerouslySetInnerHTML={{__html:rendered}}/>
      </div>
    </div>
  );
}

function renderMarkdown(md){
  return md
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\| *(.+?) *\| *(.+?) *\| *(.+?) *\|/g, (_,a,b,c)=>{
      if(a.match(/^[-\s:]+$/)) return '';
      return `<tr><td>${a}</td><td>${b}</td><td>${c}</td></tr>`;
    })
    .replace(/\| *(.+?) *\| *(.+?) *\|/g, (_,a,b)=>{
      if(a.match(/^[-\s:]+$/)) return '';
      return `<tr><td>${a}</td><td>${b}</td></tr>`;
    })
    .replace(/(<tr>.*<\/tr>\n?)+/g, m=>`<table>${m}</table>`)
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m=>`<ul>${m}</ul>`)
    .replace(/^(?!<[htuol]|<\/|$)(.+)$/gm,'<p>$1</p>');
}

// ─── Flashcard Mode ─────────────────────────────────────────
function FlashcardMode({topic, userName}){
  const { saveFlashProgress } = useProgress();
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [seen,setSeen]=useState(new Set());
  const cards=topic.flashcards||[];

  const advance=(dir)=>{
    setFlipped(false);
    const newSeen = new Set([...seen, idx]);
    setSeen(newSeen);
    if(newSeen.size >= cards.length){
      saveFlashProgress(topic.id, cards.length);
    }
    setTimeout(()=>{
      setIdx(i=> dir>0 ? (i+1)%cards.length : (i-1+cards.length)%cards.length);
    },150);
  };

  if(!cards.length) return <div style={{padding:20,color:'var(--text-3)'}}>No flashcards yet.</div>;

  const pct=Math.round((seen.size/cards.length)*100);

  return(
    <div style={{padding:'8px 16px 24px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{color:'var(--text-3)',fontSize:14}}>{idx+1} / {cards.length}</span>
        <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:'var(--teal)'}}>{pct}% seen</span>
      </div>

      <div className="flashcard-scene" onClick={()=>setFlipped(f=>!f)}>
        <div className={`flashcard-inner${flipped?' flipped':''}`}>
          <div className="flashcard-face">
            <span className="flashcard-label">TERM</span>
            <p className="flashcard-text">{cards[idx].f}</p>
          </div>
          <div className="flashcard-face flashcard-back">
            <span className="flashcard-label" style={{color:'#f5d070'}}>DEFINITION</span>
            <p className="flashcard-text" style={{fontSize:16,color:'rgba(255,255,255,0.9)'}}>{cards[idx].b}</p>
          </div>
        </div>
      </div>

      <p style={{textAlign:'center',color:'var(--text-3)',fontSize:13,margin:'12px 0 16px'}}>Tap card to flip</p>

      <div style={{display:'flex',gap:10}}>
        <button className="btn-ghost" style={{flex:1,padding:'12px'}} onClick={()=>advance(-1)}>
          ← Previous
        </button>
        <button className="btn-gold" style={{flex:1,padding:'12px',fontSize:14}} onClick={()=>advance(1)}>
          Next →
        </button>
      </div>
    </div>
  );
}

// ─── Quiz Mode ────────────────────────────────────────────────
function QuizMode({topic, userName}){
  const { saveQuizProgress, saveMistakes, saveLeaderboard } = useProgress();
  const [qIdx,setQIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const [timeLeft,setTimeLeft]=useState(60);
  const [incorrect,setIncorrect]=useState([]);
  const incorrectRef = useRef([]);
  const finalScoreRef = useRef(0);
  const timerRef=useRef(null);

  const qs=topic.quiz||[];
  const q=qs[qIdx];

  const reset=()=>{
    setQIdx(0);setSel(null);setScore(0);setDone(false);setTimeLeft(60);setIncorrect([]);
    incorrectRef.current=[];
    finalScoreRef.current=0;
  };

  // timer
  useEffect(()=>{
    if(sel!==null||done) return;
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){ clearInterval(timerRef.current); handleAnswer(-1); return 0; }
        return t-1;
      });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[qIdx,sel,done]);

  const handleAnswer=(choice)=>{
    if(sel!==null) return;
    clearInterval(timerRef.current);
    setSel(choice);
    if(choice===q.a) setScore(s=>s+1);
    else { setIncorrect(arr=>{ const n=[...arr,{q:q.q,correct:q.o[q.a],chosen:choice>=0?q.o[choice]:'Time up',exp:q.e,ts:Date.now()}]; incorrectRef.current=n; return n; }); }
  };

  const next=()=>{
    if(qIdx<qs.length-1){
      setQIdx(i=>i+1);setSel(null);setTimeLeft(60);
    } else {
      setDone(true);
      const lastCorrect = (sel === q.a) ? 1 : 0;
      const finalScore = score + lastCorrect;
      finalScoreRef.current = finalScore;
      // Save progress immediately via context — updates UI right away
      saveQuizProgress(topic.id, finalScore);
      // Save mistakes
      const lastWrong = (sel===q.a) ? incorrectRef.current : [...incorrectRef.current,{q:q.q,correct:q.o[q.a],chosen:sel>=0?q.o[sel]:'Time up',exp:q.e,ts:Date.now()}];
      saveMistakes(topic.id, lastWrong);
      // Save leaderboard
      saveLeaderboard(topic.id, topic.title, finalScore, qs.length, userName);
    }
  };
  const goBack=()=>{
    if(qIdx===0) return;
    clearInterval(timerRef.current);
    setQIdx(i=>i-1);setSel(null);setTimeLeft(60);
  };

  if(done){
    const finalScore=finalScoreRef.current||score;
    const total=qs.length;
    const pct=Math.round((finalScore/total)*100);
    return(
      <div style={{padding:'16px 16px 28px'}} className="fade-up">
        {/* Score card */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:'var(--radius)',padding:'28px 24px',textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:48,marginBottom:16,lineHeight:1}}>{pct>=80?'🏆':pct>=60?'⭐':'📖'}</div>
          <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11,fontWeight:700,
            color:'var(--text-3)',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:10}}>
            Quiz Complete
          </p>
          <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:52,fontWeight:700,
            color: pct>=80?'var(--teal)':pct>=60?'var(--gold)':'var(--text-2)',
            letterSpacing:'-0.03em',lineHeight:1,marginBottom:4}}>
            {finalScore}<span style={{fontSize:28,color:'var(--text-3)'}}>/{total}</span>
          </p>
          <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:'var(--text-3)',marginBottom:20}}>
            {pct}% correct
          </p>
          <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:22,
            padding:'8px 16px',background:'rgba(62,207,160,0.07)',border:'1px solid rgba(62,207,160,0.15)',
            borderRadius:30}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="13" height="13">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11,fontWeight:600,
              color:'var(--teal)',letterSpacing:'0.04em'}}>Saved to leaderboard</span>
          </div>
          <div style={{display:'block'}}>
            <button className="btn-gold" style={{padding:'12px 32px',fontSize:14,borderRadius:12}} onClick={reset}>
              Try Again
            </button>
          </div>
        </div>
        {incorrect.length>0&&(
          <div>
            <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:10,fontWeight:700,
              color:'var(--text-3)',letterSpacing:'0.1em',marginBottom:10,textTransform:'uppercase'}}>
              Review Mistakes ({incorrect.length})
            </p>
            {incorrect.map((item,i)=>(
              <div key={i} style={{padding:'14px 15px',background:'rgba(255,80,80,0.04)',
                border:'1px solid rgba(255,80,80,0.12)',borderRadius:'var(--radius-sm)',marginBottom:9}}>
                <p style={{fontWeight:600,fontSize:14,marginBottom:7,color:'var(--text)',fontFamily:"'Lora',serif"}}>{item.q}</p>
                <p style={{fontSize:12,color:'#f87171',marginBottom:3,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>✗ {item.chosen}</p>
                <p style={{fontSize:12,color:'var(--teal)',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{item.correct ? '✓ '+item.correct : ''}</p>
                {item.exp&&<div className="quiz-explain" style={{marginTop:8,fontSize:13}}>{item.exp}</div>}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  if(!q) return null;
  const timerPct=(timeLeft/60)*100;

  return(
    <div style={{padding:'8px 16px 24px'}}>
      {/* Progress */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",color:'var(--text-3)',fontSize:12,fontWeight:600,letterSpacing:'0.05em'}}>Q{qIdx+1} / {qs.length}</span>
        <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:'var(--teal)',fontWeight:700,letterSpacing:'0.03em'}}>{score} pts</span>
      </div>

      {/* Timer */}
      <div className="quiz-timer">
        <svg viewBox="0 0 24 24" fill="none" stroke={timeLeft<=10?'#f87171':'var(--gold)'} strokeWidth="2" width="16" height="16" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <div className="quiz-timer-bar">
          <div className="quiz-timer-fill" style={{width:`${timerPct}%`,background:
            timeLeft>30?'var(--teal-dk)':timeLeft>10?'var(--gold)':'#e05050'}}/>
        </div>
        <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,fontWeight:600,color:timeLeft<=10?'#f87171':'var(--text-3)',minWidth:24}}>{timeLeft}s</span>
      </div>

      {/* Question */}
      <div className="glass-3d" style={{padding:'18px 18px 20px',marginBottom:16}}>
        <p className="quiz-question">{q.q}</p>
        {q.o.map((opt,i)=>{
          let cls='quiz-opt';
          if(sel!==null){
            if(i===q.a) cls+=' correct';
            else if(i===sel&&sel!==q.a) cls+=' wrong';
          }
          return(
            <button key={i} className={cls} onClick={()=>handleAnswer(i)} disabled={sel!==null}>
              <span style={{marginRight:8,color:'var(--gold)',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:13}}>
                {String.fromCharCode(65+i)}.
              </span>{opt}
            </button>
          );
        })}
        {sel!==null&&(
          <div className="quiz-explain">
            <strong style={{color: sel===q.a?'#f5d070':'#ff9090'}}>
              {sel===q.a?'✓ Correct!':'✗ Incorrect'}
            </strong>{' — '}{q.e}
          </div>
        )}
      </div>

      {/* Nav buttons */}
      <div style={{display:'flex',gap:10}}>
        <button className="btn-ghost" style={{padding:'12px 16px',fontSize:14,opacity:qIdx===0?0.3:1}} onClick={goBack} disabled={qIdx===0}>
          ← Back
        </button>
        {sel!==null&&(
          <button className="btn-gold" style={{flex:1,padding:'12px',fontSize:15}} onClick={next}>
            {qIdx<qs.length-1?'Next Question →':'See Results'}
          </button>
        )}
      </div>
    </div>
  );
}

// LEADERBOARD TAB
// ═══════════════════════════════════════════════════════════
function LeaderboardTab() {
  const { getLeaderboard } = useProgress();
  const [topicId, setTopicId] = useState('overall');
  const [rows, setRows] = useState([]);
  const [myName, setMyName] = useState('');
  const [showPicker, setShowPicker] = useState(false);

  useEffect(()=>{ const n = storage.get('userName'); if(n) setMyName(n); },[]);

  // Re-compute rows whenever topicId changes or on mount
  useEffect(()=>{ setRows(getLeaderboard(topicId)); },[topicId]);

  const refresh = () => setRows(getLeaderboard(topicId));

  const currentLabel = topicId==='overall' ? 'Overall' : TOPICS.find(t=>t.id===topicId)?.title || topicId;
  const rankColors = ['gold','silver','bronze'];

  return(
    <div className="fade-up">
      <div className="page-header" style={{justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="24" height="24">
            <polyline points="8 21 12 21 16 21"/><line x1="12" y1="17" x2="12" y2="21"/>
            <path d="M7 4H17l-1 7a5 5 0 01-8 0L7 4z"/>
            <path d="M7 4c0 0-4 0-4 4s4 4 4 4"/><path d="M17 4c0 0 4 0 4 4s-4 4-4 4"/>
          </svg>
          <h1 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:20,letterSpacing:'-0.01em'}}>Leaderboard</h1>
        </div>
        <button onClick={refresh} style={{background:'none',border:'none',cursor:'pointer',
          color:'var(--gold)',padding:6,borderRadius:8,display:'flex',alignItems:'center'}}
          title="Refresh scores">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="20" height="20">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>

      {/* Topic Selector */}
      <div style={{padding:'0 16px 14px',position:'relative'}}>
        <button className="glass-3d" onClick={()=>setShowPicker(p=>!p)}
          style={{width:'100%',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',
            border:'none',cursor:'pointer',color:'var(--text)',fontSize:15,borderRadius:'var(--radius)'}}>
          <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:14,color:'var(--gold)'}}>{currentLabel}</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="16" height="16">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        {showPicker&&(
          <div className="glass-strong" style={{position:'absolute',top:'100%',left:16,right:16,zIndex:80,
            borderRadius:'var(--radius)',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.7)'}}>
            {[{id:'overall',title:'Overall (All Topics)',Icon:()=>null},...TOPICS].map((t,i)=>(
              <button key={t.id} onClick={()=>{setTopicId(t.id);setShowPicker(false);setRows(getLeaderboard(t.id));}}
                style={{width:'100%',padding:'12px 16px',background:topicId===t.id?'rgba(212,168,83,0.15)':'none',
                  border:'none',borderBottom:i<TOPICS.length?'1px solid rgba(255,255,255,0.05)':'none',
                  cursor:'pointer',textAlign:'left',color:topicId===t.id?'var(--gold)':'var(--text)',
                  fontSize:14,display:'flex',alignItems:'center',gap:10}}>
                {t.id!=='overall'&&<t.Icon/>}
                {t.id==='overall'&&<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="18" height="18"><polyline points="8 21 12 21 16 21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M7 4H17l-1 7a5 5 0 01-8 0L7 4z"/><path d="M7 4c0 0-4 0-4 4s4 4 4 4"/><path d="M17 4c0 0 4 0 4 4s-4 4-4 4"/></svg>}
                {t.title}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{padding:'0 16px 24px'}}>
        {rows.length===0 ? (
          <div className="glass" style={{padding:32,textAlign:'center'}}>
            <p style={{color:'var(--text-3)',marginBottom:8}}>No scores yet!</p>
            <p style={{color:'var(--text-3)',fontSize:14}}>Complete quizzes to appear here.</p>
          </div>
        ) : (
          rows.map((row,i)=>(
            <div key={i} className={`lb-row${row.name===myName?' me':''}`}>
              <span className={`lb-rank${i<3?' '+rankColors[i]:''}`}>
                {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}
              </span>
              <div style={{flex:1}}>
                <p style={{fontSize:14,fontWeight:700,color:row.name===myName?'var(--gold)':'var(--text)',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{row.name}</p>
                {topicId!=='overall'&&row.total&&(
                  <p style={{fontSize:12,color:'var(--text-3)'}}>{row.score}/{row.total} correct</p>
                )}
              </div>
              <div style={{textAlign:'right'}}>
                <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:20,fontWeight:700,color:'var(--gold)',letterSpacing:'-0.02em'}}>{row.score}</p>
                <p style={{fontSize:10,color:'var(--text-3)',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,letterSpacing:'0.05em'}}>PTS</p>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// REELS TAB — full-screen, Instagram-style
// ═══════════════════════════════════════════════════════════
function ReelsTab() {
  // Shuffle reels once on mount
  const [reels] = useState(() => {
    const arr = [...REELS];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  });

  const [idx, setIdx] = useState(0);
  // likes: set of reel ids liked
  const [liked, setLiked] = useState(() => {
    try { const v = ls.get('reel_likes'); return new Set(v ? JSON.parse(v) : []); } catch { return new Set(); }
  });
  // likeCounts: map id -> count
  const [likeCounts, setLikeCounts] = useState(() => {
    try { const v = ls.get('reel_counts'); return v ? JSON.parse(v) : {}; } catch { return {}; }
  });

  const containerRef = useRef(null);

  const saveLikes = (newLiked, newCounts) => {
    ls.set('reel_likes', JSON.stringify([...newLiked]));
    ls.set('reel_counts', JSON.stringify(newCounts));
  };

  const toggleLike = (reelId) => {
    setLiked(prev => {
      const next = new Set(prev);
      const nextCounts = { ...likeCounts };
      if (next.has(reelId)) {
        next.delete(reelId);
        nextCounts[reelId] = Math.max(0, (nextCounts[reelId] || 1) - 1);
      } else {
        next.add(reelId);
        nextCounts[reelId] = (nextCounts[reelId] || 0) + 1;
      }
      setLikeCounts(nextCounts);
      saveLikes(next, nextCounts);
      return next;
    });
  };

  const handleScroll = () => {
    const el = containerRef.current;
    if (!el) return;
    const h = el.clientHeight || 1;
    setIdx(Math.round(el.scrollTop / h));
  };

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 5, background: '#000' }}>
      <style>{`
        .reel-scroll::-webkit-scrollbar { display: none; }
        @keyframes reelFadeUp {
          from { opacity:0; transform:translateY(22px); }
          to   { opacity:1; transform:translateY(0); }
        }
        @keyframes heartPop {
          0%   { transform:translate(-50%,-50%) scale(0);   opacity:1; }
          40%  { transform:translate(-50%,-50%) scale(1.4); opacity:1; }
          70%  { transform:translate(-50%,-50%) scale(1.1); opacity:1; }
          100% { transform:translate(-50%,-50%) scale(1.3); opacity:0; }
        }
        @keyframes likeFloat {
          0%   { transform:scale(1);    opacity:1; }
          30%  { transform:scale(1.35); opacity:1; }
          60%  { transform:scale(0.9);  opacity:1; }
          100% { transform:scale(1);    opacity:1; }
        }
        @keyframes likeUnFloat {
          0%   { transform:scale(1);   }
          50%  { transform:scale(0.75);}
          100% { transform:scale(1);   }
        }
      `}</style>

      <div
        ref={containerRef}
        className="reel-scroll"
        onScroll={handleScroll}
        style={{
          height: '100%', overflowY: 'scroll',
          scrollSnapType: 'y mandatory',
          WebkitOverflowScrolling: 'touch',
          scrollbarWidth: 'none',
        }}
      >
        {reels.map((reel, i) => (
          <ReelSlide
            key={reel.id}
            reel={reel}
            active={i === idx}
            isLiked={liked.has(reel.id)}
            likeCount={likeCounts[reel.id] || 0}
            onLike={() => toggleLike(reel.id)}
            isFirst={i === 0}
          />
        ))}
      </div>
    </div>
  );
}

function ReelSlide({ reel, active, isLiked, likeCount, onLike, isFirst }) {
  const [flipped, setFlipped]     = useState(false);
  const [hearts,  setHearts]      = useState([]);   // [{id,x,y}]
  const [likeAnim, setLikeAnim]   = useState(false);
  const lastTap   = useRef(0);
  const slideRef  = useRef(null);

  useEffect(() => { if (!active) setFlipped(false); }, [active]);

  // Double-tap → like + heart burst
  const handleTap = (e) => {
    const now = Date.now();
    const rect = slideRef.current?.getBoundingClientRect() || { left: 0, top: 0 };
    const x = (e.clientX ?? e.touches?.[0]?.clientX ?? window.innerWidth / 2) - rect.left;
    const y = (e.clientY ?? e.touches?.[0]?.clientY ?? window.innerHeight / 2) - rect.top;

    if (now - lastTap.current < 300) {
      // Double-tap detected
      if (!isLiked) onLike();
      // Spawn exactly one heart at the tap position
      const newHeart = { id: now, x, y };
      setHearts(prev => [...prev, newHeart]);
      setLikeAnim(true);
      setTimeout(() => setLikeAnim(false), 600);
      setTimeout(() => setHearts(prev => prev.filter(h => h.id !== newHeart.id)), 900);
      lastTap.current = 0;
    } else {
      lastTap.current = now;
    }
  };

  // parse bold + numbered/bulleted lines
  const renderBody = (text) => {
    const lines = text.split('\n');
    return lines.map((line, i) => {
      const parts = line.split(/\*\*(.+?)\*\*/g);
      const rendered = parts.map((p, j) =>
        j % 2 === 1
          ? <strong key={j} style={{ color: reel.accent, fontWeight: 700 }}>{p}</strong>
          : p
      );
      if (line.startsWith('|') && !line.match(/^[\|\-\s:]+$/)) {
        const cells = line.split('|').filter(c => c.trim()).map(c => c.trim());
        const prevLine = lines[i - 1] || '';
        const isHeader = !prevLine.match(/^[\|\-\s:]+$/);
        return (
          <div key={i} style={{ display:'grid', gridTemplateColumns:`repeat(${cells.length},1fr)`, gap:1, marginBottom:1 }}>
            {cells.map((cell, ci) => (
              <div key={ci} style={{
                padding:'5px 7px', borderRadius:4, fontSize:12,
                background: isHeader ? `${reel.accent}22` : 'rgba(255,255,255,0.04)',
                color: isHeader ? reel.accent : 'rgba(255,255,255,0.8)',
                fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight: isHeader ? 700 : 400,
              }}>{cell}</div>
            ))}
          </div>
        );
      }
      if (line.match(/^---+$/)) return <div key={i} style={{ height:1, background:`${reel.accent}30`, margin:'8px 0' }} />;
      if (!line.trim()) return <div key={i} style={{ height:6 }} />;
      return (
        <div key={i} style={{ fontFamily:"'Lora',serif", fontSize:15, lineHeight:1.72, color:'rgba(230,238,252,0.9)', marginBottom:1 }}>
          {rendered}
        </div>
      );
    });
  };

  return (
    <div
      ref={slideRef}
      onClick={handleTap}
      style={{
        height: '100vh',
        scrollSnapAlign: 'start',
        scrollSnapStop: 'always',
        position: 'relative',
        overflow: 'hidden',
        boxSizing: 'border-box',
        background: '#08090f',
        display: 'flex',
        flexDirection: 'column',
      }}
    >
      {/* Background glow */}
      <div style={{
        position:'absolute', inset:0, pointerEvents:'none',
        background:`radial-gradient(ellipse 100% 80% at 50% 40%, ${reel.accent}12 0%, transparent 70%)`,
      }} />

      {/* Accent stripe top */}
      <div style={{ height:3, background:`linear-gradient(90deg,transparent,${reel.accent},transparent)`, flexShrink:0, position:'relative', zIndex:2 }} />

      {/* ── Main layout: content left, right rail right ── */}
      <div style={{
        flex: 1,
        display: 'flex',
        flexDirection: 'row',
        padding: '10px 10px 0 14px',
        paddingBottom: `calc(var(--tab-h) + env(safe-area-inset-bottom) + 10px)`,
        gap: 10,
        overflow: 'hidden',
        position: 'relative', zIndex: 1,
      }}>

        {/* Left column: chapter tag + card + bottom label */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0 }}>

          {/* Chapter pill row */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8, flexShrink:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{
                padding:'3px 9px', borderRadius:20,
                background:`${reel.accent}18`, border:`1px solid ${reel.accent}35`,
                fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:9, fontWeight:700,
                color:reel.accent, letterSpacing:'0.08em', textTransform:'uppercase',
              }}>{reel.ch}</span>
              <span style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:10, color:'rgba(180,195,220,0.45)', fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {reel.topic}
              </span>
            </div>
            <span style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:9, fontWeight:700, color:'rgba(255,255,255,0.25)', letterSpacing:'0.05em', flexShrink:0, marginLeft:6 }}>
              {!flipped ? 'tap ↓' : '↩ back'}
            </span>
          </div>

          {/* Card — fills all remaining vertical space */}
          <div style={{
            flex: 1,
            overflow: 'hidden',
            borderRadius: 16,
            border: `1px solid ${reel.accent}28`,
            background: 'rgba(13,17,28,0.92)',
            backdropFilter: 'blur(24px)',
            WebkitBackdropFilter: 'blur(24px)',
            boxShadow: `0 16px 60px rgba(0,0,0,0.7)`,
            padding: '18px 16px 16px',
            display: 'flex', flexDirection: 'column',
            animation: active ? 'reelFadeUp 0.32s ease both' : 'none',
          }}>
            {!flipped ? (
              <>
                <h2 style={{
                  fontFamily:"'Plus Jakarta Sans',sans-serif",
                  fontSize: 20, fontWeight: 800,
                  color: '#fff', letterSpacing:'-0.02em', lineHeight:1.2,
                  marginBottom: 14, flexShrink: 0,
                }}>{reel.title}</h2>
                <div style={{ flex:1, overflowY:'auto', scrollbarWidth:'none' }}>
                  <style>{`.reel-body::-webkit-scrollbar{display:none}`}</style>
                  <div className="reel-body">
                    {renderBody(reel.body)}
                  </div>
                </div>
              </>
            ) : (
              <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', gap:12 }}>
                <div style={{ width:'100%', height:1, background:`linear-gradient(90deg,transparent,${reel.accent}50,transparent)` }} />
                <span style={{ fontSize:32 }}>📖</span>
                <p style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:9, fontWeight:700, color:reel.accent, letterSpacing:'0.12em', textTransform:'uppercase' }}>FROM THE BOOK</p>
                <p style={{ fontFamily:"'Lora',serif", fontSize:15, fontStyle:'italic', color:'rgba(230,238,252,0.7)', lineHeight:1.7, textAlign:'center' }}>
                  {reel.ch} · {reel.topic}
                </p>
                <p style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:13, fontWeight:700, color:reel.accent, textAlign:'center', lineHeight:1.3 }}>
                  {reel.title}
                </p>
                <div style={{ width:'100%', height:1, background:`linear-gradient(90deg,transparent,${reel.accent}50,transparent)` }} />
              </div>
            )}
          </div>

          {/* Bottom label — sits below card, above tab bar */}
          <div style={{ flexShrink:0, paddingTop:8 }}>
            <p style={{
              fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:9, fontWeight:700,
              color:`${reel.accent}99`, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:2,
            }}>{reel.ch} · {reel.topic}</p>
            <p style={{
              fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:12, fontWeight:700,
              color:'rgba(255,255,255,0.65)', lineHeight:1.3,
              overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
            }}>{reel.title}</p>
          </div>

        </div>

        {/* Right rail — like + save, aligned to bottom of card */}
        <div style={{
          width: 52,
          flexShrink: 0,
          display: 'flex',
          flexDirection: 'column',
          justifyContent: 'flex-end',
          alignItems: 'center',
          paddingBottom: 36,
          gap: 20,
        }}>
          {/* Like */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
            <button
              onClick={e => { e.stopPropagation(); onLike(); setLikeAnim(true); setTimeout(()=>setLikeAnim(false),600); }}
              style={{
                background:'rgba(20,22,35,0.7)', border:`1px solid rgba(255,255,255,0.1)`,
                borderRadius:'50%', width:48, height:48, cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'center',
                backdropFilter:'blur(10px)',
                animation: likeAnim ? 'likeFloat 0.5s ease' : 'none',
              }}
            >
              <svg viewBox="0 0 24 24" width="24" height="24"
                fill={isLiked ? '#ff3b5c' : 'none'}
                stroke={isLiked ? '#ff3b5c' : 'rgba(255,255,255,0.9)'}
                strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                style={{ transition:'all 0.2s ease', filter: isLiked ? 'drop-shadow(0 0 5px #ff3b5c88)' : 'none' }}>
                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
              </svg>
            </button>
            <span style={{
              fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:10, fontWeight:700,
              color: isLiked ? '#ff3b5c' : 'rgba(255,255,255,0.55)',
              transition:'color 0.2s', minHeight:14,
            }}>{likeCount > 0 ? likeCount : ''}</span>
          </div>

          {/* Save */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
            <div style={{
              background:'rgba(20,22,35,0.7)', border:`1px solid rgba(255,255,255,0.1)`,
              borderRadius:'50%', width:48, height:48,
              display:'flex', alignItems:'center', justifyContent:'center',
              backdropFilter:'blur(10px)',
            }}>
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                stroke="rgba(255,255,255,0.9)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
              </svg>
            </div>
            <span style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:10, fontWeight:700, color:'rgba(255,255,255,0.45)' }}>Save</span>
          </div>
        </div>

      </div>

      {/* Double-tap hearts */}
      {hearts.map(h => (
        <div key={h.id} style={{
          position:'absolute', left:h.x, top:h.y, pointerEvents:'none', zIndex:20,
          animation:'heartPop 0.85s ease forwards',
        }}>
          <svg viewBox="0 0 24 24" width="72" height="72" fill="#ff3b5c" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </div>
      ))}

      {/* First-reel swipe hint */}
      {isFirst && active && (
        <div style={{
          position:'absolute',
          bottom:`calc(var(--tab-h) + env(safe-area-inset-bottom) + 70px)`,
          left:0, right:60, textAlign:'center', pointerEvents:'none', zIndex:8,
          animation:'reelFadeUp 0.6s ease 1.5s both',
        }}>
          <p style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:11, color:'rgba(255,255,255,0.2)', letterSpacing:'0.06em' }}>
            scroll to browse · double-tap to like
          </p>
        </div>
      )}
    </div>
  );
}
