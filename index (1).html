const QA_DATA = [
  // ── Chapter 1: Hadith & Types ────────────────────────────
  { chapter:"Ch.1 · Hadith Types", q:"What is a Hadith Marfu?", a:"A Hadith Marfu (elevated) is a narration attributed directly to the Prophet ﷺ — his words, actions, approvals, or descriptions. It is the highest category of attribution because it reaches back to the Prophet ﷺ himself. The six means of Rafa include explicit statement, implication, ruling, action, approval, and description." },
  { chapter:"Ch.1 · Hadith Types", q:"What is a Hadith Mawquf?", a:"A Hadith Mawquf (stopped) is a narration whose chain stops at a Companion (Sahabi) of the Prophet ﷺ. It contains the words, actions, or opinions of a Companion but does not reach the Prophet ﷺ. It still carries significant authority in Islamic law due to the Companions' proximity to revelation." },
  { chapter:"Ch.1 · Hadith Types", q:"What is a Hadith Maqtu?", a:"A Hadith Maqtu (cut) is a narration whose chain ends at a Taabi (successor to the Companions) or someone after them. It represents the statements or actions of the Tabi'een. It carries the least authority of the three attribution types but may still be used as evidence in certain contexts." },
  { chapter:"Ch.1 · Hadith Types", q:"What are the 6 means of Rafa (elevation)?", a:"The six means by which a Hadith becomes Marfu are: (1) Explicit statement directly attributing words to the Prophet ﷺ, (2) Implication — where the Companion's wording implies it comes from the Prophet ﷺ, (3) Ruling — the Companion issues a legal ruling only derivable from revelation, (4) Action — describing an act of the Prophet ﷺ, (5) Approval — the Prophet ﷺ saw something and remained silent, (6) Description — describing a characteristic of the Prophet ﷺ." },
  { chapter:"Ch.1 · Hadith Types", q:"What is a Hadith Qudsi?", a:"A Hadith Qudsi (sacred) is a narration in which the Prophet ﷺ attributes the meaning to Allah, but the wording is from the Prophet ﷺ himself. It differs from the Quran in that the Quran is both the wording and meaning of Allah, while a Hadith Qudsi is only the meaning from Allah expressed in the Prophet's ﷺ own words." },

  // ── Chapter 2: Sanad & Matn Classifications ───────────────
  { chapter:"Ch.2 · Sanad & Matn", q:"What is a Muttasil (connected) chain?", a:"A Muttasil chain is one where every narrator in the chain directly heard from the narrator above them, with no gaps or breaks. It is an unbroken transmission from the collector of the Hadith all the way back to the Prophet ﷺ. A Muttasil chain is a requirement for a Hadith to be classified as Sahih or Hasan." },
  { chapter:"Ch.2 · Sanad & Matn", q:"What is a Mursal Hadith?", a:"A Mursal Hadith is one where a Taabi (successor) narrates directly from the Prophet ﷺ without mentioning a Companion in between, creating a gap in the chain. The missing link is typically a Companion. There is scholarly disagreement on whether Mursal hadiths can be used as legal evidence — Imam Malik and Abu Hanifa accepted them conditionally, while Imam Shafi'i generally rejected them." },
  { chapter:"Ch.2 · Sanad & Matn", q:"What is a Muallaq Hadith?", a:"A Muallaq (suspended) Hadith is one where the beginning of the chain — one or more narrators at the start — has been omitted. The name derives from the Arabic for 'hanging', as the chain appears to hang without a beginning. This is common in Imam Bukhari's Sahih where he sometimes mentions hadiths in chapter headings without full chains." },
  { chapter:"Ch.2 · Sanad & Matn", q:"What is a Mudallas Hadith?", a:"A Mudallas Hadith is one where a narrator conceals a defect in the chain, typically by narrating from someone they met but did not actually hear this particular hadith from, using ambiguous language like 'from' (an) instead of 'I heard' (sami'tu). This is a form of deception and weakens the hadith. The narrator who does this is called a Mudallis." },
  { chapter:"Ch.2 · Sanad & Matn", q:"What is a Mudtarib Hadith?", a:"A Mudtarib (confused/contradictory) Hadith is one narrated in contradictory ways of equal strength — where the chain or text varies between narrators and the contradiction cannot be resolved by preferring one version over another. This contradiction indicates a weakness in the hadith. If one version can be shown to be stronger, the hadith is not Mudtarib." },
  { chapter:"Ch.2 · Sanad & Matn", q:"What is a Mudraj Hadith?", a:"A Mudraj (interpolated) Hadith is one where additional words have been inserted into the text or chain — either by a narrator explaining something or adding commentary — without making clear that the addition is not part of the original narration. These insertions (Idraj) can occur at the beginning, middle, or end of a hadith and weaken it." },

  // ── Chapter 3: Shadh, Munkar & Related ────────────────────
  { chapter:"Ch.3 · Shadh & Munkar", q:"What is a Shadh Hadith?", a:"A Shadh (anomalous/irregular) Hadith is one narrated by a reliable narrator that contradicts what other more reliable or more numerous narrators have reported. The term means 'solitary' or 'odd'. Despite the narrator being trustworthy, when their narration goes against stronger or more numerous reports, it is classified as Shadh and is not accepted as evidence." },
  { chapter:"Ch.3 · Shadh & Munkar", q:"What is a Munkar Hadith?", a:"A Munkar (rejected/denounced) Hadith is one narrated by a weak narrator that contradicts what reliable narrators have reported. It is similar to Shadh but the difference is the status of the narrator — in Shadh the narrator is reliable, in Munkar the narrator is weak. A Munkar hadith is a severe form of weakness and such hadiths are rejected." },
  { chapter:"Ch.3 · Shadh & Munkar", q:"What is a Muallal (defective) Hadith?", a:"A Muallal (defective) Hadith is one that appears sound on the surface but has a hidden defect (illah) that affects its authenticity. Discovering these defects requires deep expertise in Hadith sciences. Common defects include: a narrator incorrectly connecting a Mawquf hadith to the Prophet ﷺ, confusing two chains, or inserting one narrator's words into another's hadith." },
  { chapter:"Ch.3 · Shadh & Munkar", q:"What is I'tibar, Mutabi and Shahid?", a:"These are methods of supporting a weak hadith: I'tibar means examining a hadith to see if it has supporting narrations. A Mutabi (corroborating) narration is one that follows the same chain — another narrator narrates from the same Companion. A Shahid (witness) is a narration with different chains but the same or similar meaning. Together these can elevate a Hasan hadith or strengthen a weak one." },

  // ── Chapter 4: Sahih, Hasan, Daif ─────────────────────────
  { chapter:"Ch.4 · Sahih / Hasan / Daif", q:"What are the 5 conditions for a Sahih Hadith?", a:"A Hadith Sahih (authentic) must meet five conditions: (1) Ittisal al-Sanad — the chain must be unbroken, with each narrator directly receiving from the one above, (2) Adaalah — every narrator must be upright and a practising Muslim, (3) Dabt — every narrator must have strong memory/accuracy, (4) Salaamah min al-Shudhoodh — freedom from Shadh (contradiction with stronger reports), (5) Salaamah min al-Illah — freedom from hidden defects (Illah)." },
  { chapter:"Ch.4 · Sahih / Hasan / Daif", q:"What is a Hadith Hasan and how does it differ from Sahih?", a:"A Hadith Hasan (good) meets all five conditions of Sahih except that one or more narrators have slightly weaker — though still acceptable — memory (Dabt). It is still accepted as legal evidence like a Sahih hadith. Imam Tirmidhi popularised this category. Some scholars distinguish between Hasan li-Dhatihi (intrinsically good) and Hasan li-Ghayrihi (good due to supporting narrations elevating a weak hadith)." },
  { chapter:"Ch.4 · Sahih / Hasan / Daif", q:"What makes a Hadith Daif (weak)?", a:"A Hadith Daif (weak) fails to meet one or more of the five conditions of Sahih. The weakness may be in the chain (broken links, unknown narrators) or in a narrator's character or memory. Daif hadiths have varying degrees of weakness — some are slightly weak and can be used for virtuous deeds (Fada'il al-A'mal), while others are severely weak (Mawdu — fabricated) and cannot be used at all." },
  { chapter:"Ch.4 · Sahih / Hasan / Daif", q:"What is a Mawdu (fabricated) Hadith?", a:"A Mawdu Hadith is a fabricated narration falsely attributed to the Prophet ﷺ. It is the most severe form of weakness and is considered a major sin to narrate knowingly. Fabrications arose due to political motivations, misguided piety (some fabricated hadiths to encourage worship), and storytellers seeking attention. Hadith scholars developed rigorous methods to identify and expose fabrications." },
  { chapter:"Ch.4 · Sahih / Hasan / Daif", q:"What is the difference between Sahih li-Dhatihi and Sahih li-Ghayrihi?", a:"Sahih li-Dhatihi (intrinsically authentic) meets all five conditions independently and is the highest grade. Sahih li-Ghayrihi (authentic due to external support) is a Hasan hadith that is elevated to Sahih status because multiple supporting narrations exist. The supporting narrations together give it the strength of a Sahih hadith even though individually each chain would only qualify as Hasan." },

  // ── Chapter 5: Adaalah ─────────────────────────────────────
  { chapter:"Ch.5 · Adaalah", q:"What is Adaalah (uprightness) in a narrator?", a:"Adaalah refers to the moral uprightness and religious integrity of a hadith narrator. A narrator with Adaalah must be: a Muslim, an adult (Baligh), of sound mind, free from major sins (Fisq), and free from conduct that undermines dignity (Muru'ah). Only narrations from narrators possessing Adaalah are accepted in hadith transmission." },
  { chapter:"Ch.5 · Adaalah", q:"What are the 5 reasons for Ta'n (criticism) of a narrator's Adaalah?", a:"The five reasons a narrator's Adaalah (uprightness) may be criticized are: (1) Kadhib — lying, i.e. fabricating hadiths attributed to the Prophet ﷺ, (2) Ittihaam bil-Kadhib — being accused of lying even if not proven, (3) Fisq — open immorality or major sins, (4) Bid'ah — blameworthy innovation in religion, (5) Jahaalah — being unknown, i.e. the narrator's identity or reliability is not established." },
  { chapter:"Ch.5 · Adaalah", q:"How was Adaalah established for a narrator?", a:"A narrator's Adaalah was established in several ways: (1) widespread positive reputation among scholars of hadith, (2) explicit praise (Tawtheeq) from reliable hadith scholars who knew the narrator personally, (3) for the Companions, their Adaalah is established by the Quran and Sunnah collectively. The Companions are all considered upright (Udul) by the consensus of Ahl al-Sunnah." },

  // ── Chapter 6: Dabt ───────────────────────────────────────
  { chapter:"Ch.6 · Dabt", q:"What is Dabt (accuracy) in a narrator?", a:"Dabt refers to a narrator's precision and accuracy in preserving and transmitting hadiths. It has two forms: Dabt al-Sadr (memory precision) — accurately memorising the hadith, and Dabt al-Kitaab (written precision) — accurately preserving it in writing. A narrator with strong Dabt transmits hadiths exactly as received without addition, omission, or distortion." },
  { chapter:"Ch.6 · Dabt", q:"What are the 5 causes of aspersion against a narrator's Dabt?", a:"The five causes of aspersion (Taan) against a narrator's accuracy (Dabt) are: (1) Kathrat al-Ghalat — excessive mistakes in narration, (2) Ghafla an al-Itqaan — negligence and lack of care in preserving narrations, (3) Wahm — frequent errors due to false assumptions or confusion, (4) Mukhaalafat al-Thiqaat — consistently contradicting reliable narrators, (5) Su al-Hifz — poor memory, either permanently or in old age." },
  { chapter:"Ch.6 · Dabt", q:"What is the difference between Dabt and Adaalah?", a:"Adaalah relates to a narrator's moral and religious character — their honesty, piety, and integrity. Dabt relates to their intellectual and technical ability — their precision in memorising and accurately transmitting what they heard. Both are required for a narrator to be fully trustworthy (Thiqah). A narrator can have strong Adaalah but weak Dabt (pious but forgetful), which results in a Hasan rather than Sahih hadith." },

  // ── Chapter 7: Gharib, Aziz, Mashhur, Mutawatir ──────────
  { chapter:"Ch.7 · Rarity & Frequency", q:"What is a Hadith Gharib?", a:"A Hadith Gharib (strange/rare) is one narrated by a single narrator at some point in its chain. If the singularity is at the level of the Companion, it is called Gharib Mutlaq (absolutely rare). If it is at a later level, it is called Gharib Nisbi (relatively rare). Being Gharib does not necessarily make a hadith weak — many Gharib hadiths are Sahih, but it does require closer scrutiny." },
  { chapter:"Ch.7 · Rarity & Frequency", q:"What is a Hadith Aziz?", a:"A Hadith Aziz (rare-but-supported) is one narrated by at least two narrators at every level of its chain — no level has only a single narrator. The word Aziz in Arabic means both 'rare' and 'strong', reflecting that it has just enough support to be slightly stronger than Gharib. It is stronger than Gharib but weaker than Mashhur." },
  { chapter:"Ch.7 · Rarity & Frequency", q:"What is a Hadith Mashhur?", a:"A Hadith Mashhur (well-known/famous) is one narrated by three or more narrators at every level of its chain, but does not reach the level of Mutawatir. It is widely transmitted among scholars. Many hadiths are Mashhur in terms of their fame among Muslims even if technically they may be weak or even fabricated, so the technical classification matters more than popular fame." },
  { chapter:"Ch.7 · Rarity & Frequency", q:"What is a Hadith Mutawatir?", a:"A Hadith Mutawatir (mass-transmitted) is narrated by such a large number of people at every level that it is rationally impossible for them all to have colluded on a lie. It produces certain knowledge (Yaqeen), unlike other hadiths which produce probability. Scholars differ on the minimum number required — some say 10, others say 40 or more. Mutawatir hadiths are binding with the same certainty as Quranic verses." },

  // ── Chapter 8: Preference Ladder & Tirmidhi ───────────────
  { chapter:"Ch.8 · Preference & Tirmidhi", q:"What is the 7-level preference ladder?", a:"When two authentic hadiths appear to contradict each other, scholars use a 7-level preference ladder (Tarjeeh) to determine which takes precedence: (1) More narrators in the chain, (2) Higher Adaalah of narrators, (3) Greater Dabt (accuracy), (4) Narrator was a Companion vs Taabi, (5) Direct hearing (Sami'tu) vs ambiguous (An), (6) Text is more explicit, (7) Text aligns with Quran or established principles. If no preference is possible, both are suspended (Tawaqquf)." },
  { chapter:"Ch.8 · Preference & Tirmidhi", q:"What terminology did Imam Tirmidhi use?", a:"Imam Tirmidhi (209–279 AH) developed distinctive grading terminology in his Sunan: 'Hasan Sahih' means the hadith is narrated through multiple chains, some reaching Sahih level and some Hasan level. 'Hasan Gharib' means good but narrated by a single narrator at some level. 'Sahih Gharib' means authentic but rare. Tirmidhi's work was crucial in popularising and systematising the Hasan category that sits between Sahih and Daif." },

  // ── Chapter 9: Legal Rulings from Hadith Grades ──────────
  { chapter:"Ch.9 · Legal Rulings", q:"Can a Daif hadith be used as evidence?", a:"Scholars have three positions: (1) Never acceptable for any purpose (Ibn Hazm's view), (2) Acceptable only for Fada'il al-A'mal (virtuous deeds, encouraging worship) under strict conditions — the weakness must be minor, it must not contradict a stronger text, and one must not assume it is authentic (majority view), (3) Acceptable for legal rulings if no stronger evidence exists (some Hanafi and Maliki scholars). The majority position restricts Daif hadiths to Fada'il only." },
  { chapter:"Ch.9 · Legal Rulings", q:"What are the conditions for using a Daif hadith for Fada'il?", a:"Scholars who permit using weak hadiths for virtuous deeds (Fada'il al-A'mal) set three conditions: (1) The weakness must be minor — not due to lying, fabrication, or severe unreliability, (2) The action encouraged must have a general basis in authentic texts — the weak hadith only provides specific encouragement, (3) The practitioner must not believe the hadith to be authentically from the Prophet ﷺ, only acting on it as a precaution." },
  { chapter:"Ch.9 · Legal Rulings", q:"Are Sahih and Hasan hadiths both binding evidence?", a:"Yes — both Sahih and Hasan hadiths are accepted as binding legal evidence (Hujjah) in Islamic law. A Hasan hadith carries the same obligatory weight as a Sahih hadith for deriving rulings, the only difference being the degree of certainty: Sahih produces stronger probability. Both are obligatory to follow. The distinction matters primarily when two hadiths contradict each other, in which case Sahih takes precedence over Hasan." },

  // ── Chapter 10: Books of Authentic Narrations ─────────────
  { chapter:"Ch.10 · Books of Narrations", q:"What are the most authentic books of Hadith?", a:"The most important collections of authentic hadiths include: Sahih al-Bukhari (256 AH) — considered the most authentic book after the Quran, Sahih Muslim (261 AH) — second most authentic, Al-Muwatta of Imam Malik (179 AH) — the earliest major collection, Musnad of Imam Ahmad (241 AH) — one of the largest collections. These are the primary references for Hadith scholarship." },
  { chapter:"Ch.10 · Books of Narrations", q:"What is the Mustadrak of Hakim?", a:"Al-Mustadrak ala al-Sahihayn by Imam al-Hakim al-Naysaburi (321–405 AH) is a collection of hadiths the author believed met the conditions of Bukhari and Muslim but were not included in their Sahihayn. However, scholars note that Hakim was lenient in his grading — Imam Dhahabi's abridgement (Talkhis) identified many hadiths in the Mustadrak that are actually weak or even fabricated." },
  { chapter:"Ch.10 · Books of Narrations", q:"What is the difference between a Musnad and a Sunan collection?", a:"A Musnad arranges hadiths by the Companion who narrated them — all hadiths from Abu Bakr together, then all from Umar, etc. — regardless of topic. The Musnad of Ahmad ibn Hanbal is the most famous example with ~27,000 hadiths. A Sunan arranges hadiths by legal topic (chapters of Fiqh) and typically focuses on hadiths used for deriving rulings, often including some weak hadiths as well." },

  // ── Chapter 11: Kutub us-Sittah ───────────────────────────
  { chapter:"Ch.11 · Kutub us-Sittah", q:"What are the Kutub us-Sittah (Six Books)?", a:"The Kutub us-Sittah are the six canonical collections of Hadith accepted by Sunni Islam: (1) Sahih al-Bukhari by Muhammad ibn Ismail al-Bukhari (d. 256 AH), (2) Sahih Muslim by Muslim ibn al-Hajjaj (d. 261 AH), (3) Sunan Abu Dawud by Abu Dawud al-Sijistani (d. 275 AH), (4) Jami al-Tirmidhi by Muhammad al-Tirmidhi (d. 279 AH), (5) Sunan al-Nasa'i by Ahmad al-Nasa'i (d. 303 AH), (6) Sunan Ibn Majah by Ibn Majah al-Qazwini (d. 273 AH)." },
  { chapter:"Ch.11 · Kutub us-Sittah", q:"Why is Sahih al-Bukhari considered the most authentic book after the Quran?", a:"Imam Bukhari (194–256 AH) spent 16 years compiling his Sahih, selecting ~7,275 hadiths (2,602 without repetition) from over 600,000 narrations he examined. His strict conditions required: every narrator must have directly met their teacher (proven by contemporary biography), every narrator must be of the highest Adaalah and Dabt, and the chain must be completely unbroken. He reportedly performed Ghusl and prayed two Rakah before recording each hadith." },
  { chapter:"Ch.11 · Kutub us-Sittah", q:"How does Sahih Muslim differ from Sahih Bukhari?", a:"While both are called 'Sahih' and are of the highest authority, Muslim ibn al-Hajjaj (204–261 AH) arranged his collection differently: he grouped all narrations of the same hadith together in one place (making it easier to compare chains), whereas Bukhari scattered them across chapters for legal benefit. Muslim was also slightly less strict than Bukhari — he accepted narrators who met (contemporary) but did not necessarily hear from each other. Scholars debate whether Bukhari's or Muslim's arrangement is more beneficial." },
  { chapter:"Ch.11 · Kutub us-Sittah", q:"What is the focus of Sunan Abu Dawud?", a:"Sunan Abu Dawud by Abu Dawud al-Sijistani (202–275 AH) focuses specifically on hadiths used in Fiqh (legal rulings). He selected ~4,800 hadiths from 500,000 he examined. Uniquely, Abu Dawud included some weak hadiths that are stronger than analogy (Qiyas) when no authentic hadith exists on a matter, and he noted their weaknesses. He said: 'I recorded the Sahih, what resembles it, and what is close to it.'" },
  { chapter:"Ch.11 · Kutub us-Sittah", q:"What makes Jami al-Tirmidhi distinctive?", a:"Imam Tirmidhi's (209–279 AH) collection is unique in several ways: (1) He pioneered the systematic use of the 'Hasan' grade, making it a formal category, (2) He mentions the opinions of different Fiqh schools after each hadith, making it a Fiqh encyclopedia as well, (3) He explains the reasons for weakness when a hadith is weak, (4) He developed detailed grading terminology like 'Hasan Sahih Gharib', and (5) He discusses narrator biographies and reliability more explicitly than other collectors." },
  { chapter:"Ch.11 · Kutub us-Sittah", q:"What is special about Sunan al-Nasa'i?", a:"Imam Ahmad al-Nasa'i (215–303 AH) is considered by many scholars to have the strictest conditions among the four Sunan compilers — stricter even than Abu Dawud. His original larger work, al-Sunan al-Kubra, was later abridged into al-Sunan al-Sughra (also called al-Mujtaba), which contains only the hadiths he considered free from seriously criticized narrators. He was known for his expertise in identifying hidden defects (Ilal) in hadith chains." },

  // ── General Concepts ──────────────────────────────────────
  { chapter:"General Concepts", q:"What is Isnad (chain of narrators)?", a:"The Isnad (chain of transmission) is the sequence of narrators through whom a hadith was transmitted from the Prophet ﷺ to its collector. It is a unique feature of Islamic scholarship — no other religious tradition developed such a rigorous system of verifying oral transmission. Imam Abdallah ibn al-Mubarak (d. 181 AH) famously said: 'The Isnad is part of the religion; were it not for the Isnad, anyone could say whatever they wished.'" },
  { chapter:"General Concepts", q:"What is Jarh wa Ta'dil (narrator criticism)?", a:"Jarh wa Ta'dil (lit. 'wounding and making upright') is the science of evaluating hadith narrators — criticising unreliable ones (Jarh) and affirming reliable ones (Ta'dil). Scholars specialised in this field examined narrators' character, memory, and honesty through personal acquaintance, travel to meet narrators, and comparing their narrations. Key works include Al-Kamil by Ibn Adi and Mizan al-Itidal by Imam Dhahabi." },
  { chapter:"General Concepts", q:"What is the Matn (text) of a Hadith?", a:"The Matn is the actual textual content of a Hadith — the words of the Prophet ﷺ, the description of his action, or his approval. It is distinguished from the Isnad (chain of narrators). Hadith criticism examines both the Isnad (external criticism) and the Matn (internal criticism). Matn criticism looks for contradictions with the Quran, established Sunnah, historical facts, or rational principles." },
  { chapter:"General Concepts", q:"Who is Shah Abdul Haq Dehlawi?", a:"Shah Abdul Haq Mohadith Dehlawi (1551–1642 CE / 958–1052 AH) was a preeminent Indian Hadith scholar and the author of Muqaddimah Usool al-Hadith. He studied in Makkah and Madinah under leading scholars and was instrumental in reviving Hadith sciences in the Indian subcontinent. He wrote extensively in both Arabic and Persian, and his works bridge classical Hadith methodology with the South Asian scholarly tradition." },
  { chapter:"General Concepts", q:"What is the difference between Riwayah and Dirayah?", a:"Ilm al-Riwayah (transmission science) focuses on collecting and transmitting hadiths as they were received — preserving the exact wording and chain. Ilm al-Dirayah (analytical science) focuses on evaluating hadiths — examining the reliability of narrators, the soundness of chains, and the validity of texts. Usool al-Hadith primarily belongs to Dirayah, providing the principles and tools to evaluate narrations critically." },
];

function AskTab() {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [expanded, setExpanded] = useState(null);
  const [activeChapter, setActiveChapter] = useState('All');
  const [searched, setSearched] = useState(false);

  const chapters = ['All', ...Array.from(new Set(QA_DATA.map(q => q.chapter)))];

  const search = (q, ch) => {
    const term = (q||'').toLowerCase().trim();
    const filtered = QA_DATA.filter(item => {
      const chMatch = !ch || ch === 'All' || item.chapter === ch;
      if (!term) return chMatch;
      return chMatch && (
        item.q.toLowerCase().includes(term) ||
        item.a.toLowerCase().includes(term) ||
        item.chapter.toLowerCase().includes(term)
      );
    });
    setResults(filtered);
    setExpanded(null);
    setSearched(true);
  };

  const handleSearch = () => search(query, activeChapter);
  const handleChapter = (ch) => {
    setActiveChapter(ch);
    search(query, ch);
  };
  const showAll = () => {
    setQuery('');
    setActiveChapter('All');
    setResults(QA_DATA);
    setExpanded(null);
    setSearched(true);
  };

  return (
    <div className="fade-up" style={{paddingBottom:24}}>
      {/* Header */}
      <div style={{padding:'22px 20px 14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>

            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <h1 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:20,color:'var(--text)',letterSpacing:'-0.01em'}}>Knowledge Base</h1>
        </div>
        <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:'var(--text-3)',marginLeft:30}}>
          {QA_DATA.length} questions across all 11 chapters
        </p>
      </div>

      {/* Search bar */}
      <div style={{padding:'0 16px 12px'}}>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1,position:'relative'}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
              width="16" height="16" style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}>
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="text"
              value={query}
              onChange={e => setQuery(e.target.value)}
              onKeyDown={e => e.key==='Enter' && handleSearch()}
              placeholder="Search topics, terms, concepts..."
              style={{width:'100%',padding:'11px 13px 11px 38px',
                background:'var(--surface)',border:'1px solid var(--border-2)',
                borderRadius:'var(--radius-sm)',color:'var(--text)',
                fontFamily:"'Lora',serif",fontSize:14,outline:'none'}}
            />
          </div>
          <button className="btn-gold" style={{padding:'11px 16px',fontSize:13,borderRadius:'var(--radius-sm)',whiteSpace:'nowrap'}}
            onClick={handleSearch}>Search</button>
        </div>
        <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
          <button onClick={showAll}
            style={{padding:'4px 10px',borderRadius:20,border:'1px solid var(--border)',
              background:'none',cursor:'pointer',fontSize:11,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,
              color:'var(--teal)',whiteSpace:'nowrap'}}>
            Show All
          </button>
          {chapters.slice(1).map(ch => (
            <button key={ch} onClick={()=>handleChapter(ch)}
              style={{padding:'4px 10px',borderRadius:20,
                border:`1px solid ${activeChapter===ch?'rgba(212,168,83,0.4)':'var(--border)'}`,
                background:activeChapter===ch?'rgba(212,168,83,0.10)':'none',
                cursor:'pointer',fontSize:11,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,
                color:activeChapter===ch?'var(--gold)':'var(--text-3)',whiteSpace:'nowrap'}}>
              {ch.replace(/Ch\.\d+ · /,'')}
            </button>
          ))}
        </div>
      </div>

      {/* Results */}
      <div style={{padding:'0 16px'}}>
        {!searched ? (
          <div style={{textAlign:'center',padding:'40px 16px'}}>
            <div style={{fontSize:40,marginBottom:12}}>📚</div>
            <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:'var(--text-3)',marginBottom:8}}>
              Search for any Hadith sciences term
            </p>
            <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:'var(--text-3)'}}>
              Try: "Sahih", "Mursal", "Dabt", "Tirmidhi", "chain"
            </p>
          </div>
        ) : results.length === 0 ? (
          <div style={{textAlign:'center',padding:'40px 16px'}}>
            <div style={{fontSize:36,marginBottom:12}}>🔍</div>
            <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:'var(--text-3)'}}>
              No results found. Try a different search term.
            </p>
          </div>
        ) : (
          <>
            <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11,fontWeight:700,
              color:'var(--text-3)',letterSpacing:'0.08em',marginBottom:12,textTransform:'uppercase'}}>
              {results.length} result{results.length!==1?'s':''}
            </p>
            {results.map((item, i) => (
              <div key={i}
                style={{marginBottom:8,background:'var(--surface)',border:`1px solid ${expanded===i?'rgba(62,207,160,0.25)':'var(--border)'}`,
                  borderRadius:'var(--radius-sm)',overflow:'hidden',
                  transition:'border-color 0.2s'}}>
                <button
                  onClick={()=>setExpanded(expanded===i?null:i)}
                  style={{width:'100%',padding:'13px 15px',background:'none',border:'none',
                    cursor:'pointer',textAlign:'left',display:'flex',alignItems:'flex-start',gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:9,fontWeight:700,
                      color:'var(--gold)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>
                      {item.chapter}
                    </p>
                    <p style={{fontFamily:"'Lora',serif",fontSize:14,fontWeight:600,color:'var(--text)',lineHeight:1.4}}>
                      {item.q}
                    </p>
                  </div>
                  <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" strokeWidth="2"
                    strokeLinecap="round" strokeLinejoin="round" width="16" height="16"
                    style={{flexShrink:0,marginTop:2,transition:'transform 0.2s',
                      transform:expanded===i?'rotate(180deg)':'rotate(0deg)'}}>
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
                {expanded===i && (
                  <div style={{padding:'0 15px 15px',borderTop:'1px solid var(--border)'}}>
                    <p style={{fontFamily:"'Lora',serif",fontSize:14,lineHeight:1.75,color:'var(--text-2)',paddingTop:12}}>
                      {item.a}
                    </p>
                  </div>
                )}
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}


function App() {
  const [splash, setSplash] = useState(true);
  const [tab, setTab] = useState('home');
  const [userName, setUserName] = useState('');
  const [topicDetail, setTopicDetail] = useState(null);
  const [topicView, setTopicView] = useState(null);
  const touchStartX = useRef(null);
  const TABS = ['home','topics','reels','leaderboard','ask'];

  // Inject CSS
  useEffect(() => {
    const style = document.createElement('style');
    style.textContent = GLOBAL_CSS;
    document.head.appendChild(style);
    // Ensure viewport-fit=cover so iOS exposes safe-area-inset-bottom
    let vp = document.querySelector('meta[name="viewport"]');
    if (vp) {
      if (!vp.content.includes('viewport-fit')) vp.content += ', viewport-fit=cover';
    } else {
      vp = document.createElement('meta');
      vp.name = 'viewport';
      vp.content = 'width=device-width, initial-scale=1, viewport-fit=cover';
      document.head.appendChild(vp);
    }
    return () => document.head.removeChild(style);
  }, []);

  // Splash timer
  useEffect(() => {
    const t = setTimeout(() => setSplash(false), 3200);
    return () => clearTimeout(t);
  }, []);

  // Load persisted userName
  useEffect(() => {
    const n = storage.get('userName');
    if (n) setUserName(n);
  }, []);

  // Swipe between tabs / back gesture
  const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) < 60) return;
    // Swipe right (dx > 0) = go back from topicDetail or topicView
    if (dx > 0 && topicView) {
      setTopicView(null);
      setTopicDetail(topicView.id);
      return;
    }
    if (dx > 0 && topicDetail) {
      setTopicDetail(null);
      return;
    }
    if (topicView || topicDetail) return;
    // Normal tab swiping
    const idx = TABS.indexOf(tab);
    if (dx < 0 && idx < TABS.length-1) setTab(TABS[idx+1]);
    if (dx > 0 && idx > 0) setTab(TABS[idx-1]);
  };

  const saveName = (n) => {
    setUserName(n);
    storage.set('userName', n);
  };

  // Render: splash overlay > name entry > main app
  if (splash) return <SplashScreen />;
  if (!userName) return <NameEntry onDone={saveName} />;

  return (
    <ProgressProvider userName={userName}>
      <>
        <div className="bg-canvas">
          <div className="bg-orb bg-orb-1" />
          <div className="bg-orb bg-orb-2" />
          <div className="bg-orb bg-orb-3" />
          <div className="bg-grid" />
        </div>
        <div className="app-shell swipe-container" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
          <div className="content-area">
            {topicView ? (
              <TopicScreen topicId={topicView.id} mode={topicView.mode} userName={userName}
                onBack={()=>{ setTopicView(null); setTopicDetail(topicView.id); }}
                />
            ) : topicDetail ? (
              <TopicDetail topicId={topicDetail} userName={userName} onBack={()=>setTopicDetail(null)}
                onMode={(id,mode)=>{ setTopicDetail(null); setTopicView({id,mode}); }} />
            ) : (
              <>
                {tab==='home' && <HomeTab userName={userName} onGoTopics={()=>setTab('topics')} />}
                {tab==='topics' && <TopicsTab userName={userName} onSelect={(id)=>setTopicDetail(id)} />}
                {tab==='leaderboard' && <LeaderboardTab />}
                {tab==='reels' && <ReelsTab />}
                {tab==='ask' && <AskTab />}
              </>
            )}
          </div>
          {!topicView && !topicDetail && (
            <nav className="tab-bar">
              {[
                { id:'home', label:'Home', icon:<HomeIcon /> },
                { id:'topics', label:'Topics', icon:<BookIcon /> },
                { id:'reels', label:'Reels', icon:<ReelsIcon /> },
                { id:'leaderboard', label:'Scores', icon:<TrophyIcon /> },
                { id:'ask', label:'Q&A', icon:<AiIcon /> },
              ].map(t=>(
                <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
                  {t.icon}<span>{t.label}</span>
                </button>
              ))}
            </nav>
          )}
        </div>
      </>
    </ProgressProvider>
  );
}

function SplashScreen() {
  return (
    <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      background:'radial-gradient(ellipse 70% 60% at 50% 40%, #0d2030 0%, #08101c 100%)'}}>
      <style>{`
        @keyframes splashUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
        @keyframes splashGrow { from { transform:scaleX(0); } to { transform:scaleX(1); } }
        @keyframes splashPulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
      `}</style>
      <div style={{textAlign:'center',animation:'splashUp 0.8s ease 0.1s both',display:'flex',flexDirection:'column',alignItems:'center'}}>
        {/* TheSunniWay logo */}
        <img src={TSW_LOGO} alt="TheSunniWay"
          style={{height:44,objectFit:'contain',marginBottom:6,
            filter:'brightness(1.1) drop-shadow(0 2px 12px rgba(74,174,92,0.4))',
            animation:'splashPulse 3s ease infinite'}}/>
        {/* AS4 badge + Muqaddimah text side by side */}
        <div style={{display:'flex',alignItems:'center',gap:14,marginTop:16,marginBottom:4}}>
          <img src={AS4_LOGO} alt="AS4"
            style={{height:56,width:56,objectFit:'cover',borderRadius:12,
              border:'1px solid rgba(212,168,83,0.3)',
              boxShadow:'0 4px 20px rgba(0,0,0,0.5)'}}/>
          <div style={{textAlign:'left'}}>
            <h1 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:28,fontWeight:700,color:'#ffffff',
              lineHeight:1.1,letterSpacing:'0.01em'}}>Muqaddimah</h1>
            <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:10,color:'var(--gold)',fontWeight:700,
              letterSpacing:'0.15em',marginTop:5}}>EXAM PREPARATION</p>
          </div>
        </div>
      </div>
      <div style={{margin:'22px auto 0',height:1,width:180,
        background:'linear-gradient(90deg,transparent,#e8b84b,transparent)',
        animation:'splashGrow 1s ease 0.7s both',transformOrigin:'center'}}/>
      <p style={{fontFamily:"'Lora',serif",fontSize:13,color:'rgba(255,255,255,0.32)',
        marginTop:20,animation:'splashUp 0.7s ease 1.1s both',letterSpacing:'0.05em'}}>
        Any issues contact GM
      </p>
      <div style={{position:'absolute',width:500,height:500,borderRadius:'50%',
        background:'radial-gradient(circle,rgba(212,168,83,0.12) 0%,transparent 70%)',
        bottom:-200,left:-150,pointerEvents:'none'}}/>
      <div style={{position:'absolute',width:350,height:350,borderRadius:'50%',
        background:'radial-gradient(circle,rgba(74,124,63,0.05) 0%,transparent 70%)',
        top:-100,right:-80,pointerEvents:'none'}}/>
    </div>
  );
}

// ── Name Entry (shown only once, name persisted) ───────────
function NameEntry({onDone}) {
  const [v,setV]=useState('');
  return (
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:24,zIndex:200}}>
      <div className="bg-canvas">
        <div className="bg-orb bg-orb-1"/><div className="bg-orb bg-orb-2"/>
        <div className="bg-grid"/>
      </div>
      <div className="glass-3d fade-up" style={{padding:36,maxWidth:360,width:'100%',textAlign:'center',position:'relative',zIndex:1}}>
        <h1 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:24,fontWeight:700,color:'var(--text)',letterSpacing:'-0.02em',marginBottom:6}}>Usool al-Hadith</h1>
        <p style={{color:'var(--text-3)',marginBottom:28,fontSize:15,fontFamily:"'Lora',serif"}}>Muqaddimah Mishkaat</p>
        <input type="text" placeholder="Enter your name..." value={v}
          onChange={e=>setV(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&v.trim()&&onDone(v.trim())}
          style={{marginBottom:16,width:'100%',padding:'13px 16px',borderRadius:14,
            border:'1px solid rgba(212,168,83,0.25)',background:'rgba(255,255,255,0.05)',
            color:'#ffffff',fontSize:16,outline:'none',fontFamily:"'Lora',serif"}} />
        <p style={{fontSize:12,color:'var(--text-3)',marginBottom:16,fontFamily:"'Lora',serif"}}>
          Your name will be remembered across sessions
        </p>
        <button className="btn-gold" style={{width:'100%',padding:'14px',fontSize:16,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600}}
          onClick={()=>v.trim()&&onDone(v.trim())}>Begin →</button>
      </div>
    </div>
  );
}
